  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

links{display:flex;gap:34px;align-items:center}\n.nav-links a{color:var(--muted);text-decoration:none;font-size:.92rem;font-weight:400;transition:color .3s;position:relative}\n.nav-links a:not(.cta)::after{content:'';position:absolute;left:0;bottom:-5px;width:0;height:1px;background:var(--gold);transition:width .3s}\n.nav-links a:not(.cta):hover{color:var(--text)}\n.nav-links a:not(.cta):hover::after{width:100%}\na.cta{font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;color:var(--bg)!important;\n  background:linear-gradient(135deg,var(--gold-light),var(--gold));padding:12px 26px;border-radius:40px;\n  font-weight:600;transition:transform .3s,box-shadow .3s}\na.cta:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,163,92,.35)}\n.burger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:6px}\n.burger span{display:block;width:24px;height:2px;background:var(--gold);transition:all .3s}\n@media(max-width:880px){\n  .nav-links{position:fixed;top:62px;right:0;left:0;background:rgba(10,14,20,.97);flex-direction:column;\n    padding:30px;gap:24px;transform:translateY(-130%);transition:transform .4s;border-bottom:1px solid var(--line)}\n  .nav-links.open{transform:none}\n  .burger{display:flex}\n}\n\n/* ---------- HERO ---------- */\n.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;\n  position:relative;padding:130px 6vw 90px}\n.hero-inner{position:relative;width:100%;max-width:1150px;display:flex;align-items:center;justify-content:space-between;gap:64px}\n.hero-text{flex:1;max-width:620px;text-align:left}\n.hero-text h1{font-size:clamp(2.3rem,4.4vw,4rem);max-width:100%}\n.hero-portrait{flex:none;width:330px;aspect-ratio:4/5;position:relative;opacity:0;animation:fadeUp 1.2s .5s forwards}\n.hero-portrait .pimg{position:absolute;inset:0;background:var(--portrait) center/cover;border-radius:20px;box-shadow:0 40px 90px rgba(0,0,0,.6);z-index:1}\n.hero-portrait:: ction>\n\n<!-- ==================== EXPERTISES ==================== -->\n<section class=\"section\" id=\"expertises\">\n  <div class=\"kicker reveal\">Vos objectifs<\u002Fdiv>\n  <h2 class=\"section-title reveal\">Qu'est-ce qui compte pour vous ?<\u002Fh2>\n  <p class=\"section-sub reveal\">Derrière chaque placement, il y a un projet de vie. On part du vôtre — jamais d'un produit.<\u002Fp>\n  <div class=\"cards\">\n    <div class=\"card reveal\"><div class=\"icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 17 8 12 12 16 21 7\"><\u002Fpolyline><polyline points=\"15 7 21 7 21 13\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><h3>Faire travailler mon épargne<\u002Fh3><p>Votre argent dort sur des livrets ? Construisons une allocation diversifiée et adaptée à votre profil : assurance vie, contrat de capitalisation, PER, SCPI, épargne salariale, private equity…<\u002Fp><\u002Fdiv>\n    <div class=\"card reveal\"><div class=\"icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"5\" x2=\"5\" y2=\"19\"><\u002Fline><circle cx=\"6.5\" cy=\"6.5\" r=\"2.5\"><\u002Fcircle><circle cx=\"17.5\" cy=\"17.5\" r=\"2.5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><h3>Alléger ma fiscalité<\u002Fh3><p>Activer les dispositifs adaptés à votre situation réelle pour payer le juste impôt — en toute légalité, sans montage hasardeux.<\u002Fp><\u002Fdiv>\n    <div class=\"card reveal\"><div class=\"icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 18a5 5 0 0 0-10 0\"><\u002Fpath><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"9\"><\u002Fline><line x1=\"4.22\" y1=\"10.22\" x2=\"5.64\" y2=\"11.64\"><\u002Fline><line x1=\"1\" y1=\"18\" x2=\"3\" y2=\"18\"><\u002Fline><line x1=\"21\" y1=\"18\" x2=\"23\" y2=\"18\"><\u002Fline><line x1=\"18.36\" y1=\"11.64\" x2=\"19.78\" y2=\"10.22\"><\u002Fline><line x1=\"23\" y1=\"22\" x2=\"1\" y2=\"22\"><\u002Fline><polyline points=\"8 6 12 2 16 6\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><h3>Préparer ma retraite<\u002Fh3><p>Anticiper la baisse de revenus pour maintenir votre niveau de vie demain : PER, assurance vie, stratégies de capitalisation.<\u002Fp><\u002Fdiv>\n    <div class=\"card reveal\"><div class=\"icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21h18\"><\u002Fpath><path d=\"M5 21V7l7-4 7 4v14\"><\u002Fpath><path d=\"M9 21v-4h6v4\"><\u002Fpath><line x1=\"9\" y1=\"10\" x2=\"9.01\" y2=\"10\"><\u002Fline><line x1=\"12\" y1=\"10\" x2=\"12.01\" y2=\"10\"><\u002Fline><line x1=\"15\" y1=\"10\" x2=\"15.01\" y2=\"10\"><\u002Fline><line x1=\"9\" y1=\"13\" x2=\"9.01\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"13\" x2=\"12.01\" y2=\"13\"><\u002Fline><line x1=\"15\" y1=\"13\" x2=\"15.01\" y2=\"13\"><\u002Fline><\u002Fsvg><\u002Fdiv><h3>Investir dans l'immobilier<\u002Fh3><p>Percevoir des revenus potentiels réguliers sans contrainte de gestion locative, notamment via les SCPI.<\u002Fp><\u002Fdiv>\n    <div class=\"card reveal\"><div class=\"icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><path d=\"M9.5 12l2 2 3.5-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Protéger mes proches<\u002Fh3><p>Organiser la transmission de votre patrimoine et la protection de votre famille, au bon moment et au bon coût.<\u002Fp><\u002Fdiv>\n    <div class=\"card reveal\"><div class=\"icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polygon points=\"16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76\"><\u002Fpolygon><\u002Fsvg><\u002Fdiv><h3>Y voir clair, enfin<\u002Fh3><p>Un diagnostic global de votre situation et un plan d'action concret, expliqué simplement — avantages comme risques.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== MÉTHODE ==================== -->\n<section class=\"method\" id=\"methode\">\n  <div class=\"section\">\n    <div class=\"kicker reveal\">La méthode<\u002Fdiv>\n    <h2 class=\"section-title reveal\">Un accompagnement en trois temps<\u002Fh2>\n    <p class=\"section-sub reveal\">Pas de produit avant le diagnostic. Jamais.<\u002Fp>\n    <div class=\"steps\">\n      <div class=\"step reveal\">\n        <div class=\"n\">01<\u002Fdiv>\n        <h3>Le bilan patrimonial<\u002Fh3>\n        <p>Un échange de 45 minutes pour comprendre votre situation : revenus, épargne existante, fiscalité, projets, contraintes. On fait le point, sans engagement.<\u002Fp>\n        <span class=\"tag\">45 min<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"n\">02<\u002Fdiv>\n        <h3>La stratégie sur-mesure<\u002Fh3>\n        <p>Je construis une stratégie adaptée à votre profil de risque et vos objectifs, présentée clairement : ce que je recommande, pourquoi, avec quels avantages et quels risques.<\u002Fp>\n        <span class=\"tag\">Transparence totale<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step reveal\">\n        <div class=\"n\">03<\u002Fdiv>\n        <h3>Le suivi dans la durée<\u002Fh3>\n        <p>Votre vie évolue, votre stratégie aussi. Points réguliers, ajustements, disponibilité : vous n'êtes jamais seul face à vos décisions patrimoniales.<\u002Fp>\n        <span class=\"tag\">Long terme<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== DIAGNOSTIC ==================== -->\n<section class=\"section\" id=\"diagnostic\">\n  <div class=\"kicker reveal\">Check-up<\u002Fdiv>\n  <h2 class=\"section-title reveal\">Votre patrimoine, noté sur 100<\u002Fh2>\n  <p class=\"section-sub reveal\">10 questions, 2 minutes, aucun email demandé. À la clé : votre score et des conseils concrets, applicables dès ce soir.<\u002Fp>\n  <div class=\"quiz-panel reveal\">\n    <div class=\"q-progress\"><i id=\"qBar\"><\u002Fi><\u002Fdiv>\n    <div id=\"quizBody\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== TÉMOIGNAGES ==================== -->\n<section class=\"testimonials\">\n  <div class=\"section\">\n    <div class=\"kicker reveal\">Ils me font confiance<\u002Fdiv>\n    <h2 class=\"section-title reveal\">Paroles de clients<\u002Fh2>\n    <p class=\"section-sub reveal\">Avis authentiques publiés sur Google.<\u002Fp>\n    <div class=\"quote-wrap reveal\">\n    <div class=\"quote-cards\" id=\"quoteTrack\">\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Très bon échange. Alban est à l'écoute, pédagogue et professionnel. Les explications étaient claires, adaptées à ma situation et sans pression commerciale. J'ai particulièrement apprécié la transparence et la qualité des conseils apportés.<\u002Fp>\n        <div class=\"who\">Thomas H.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Alban prend le soin et le temps de connaître les besoins et projets de ses clients pour des solutions sur mesure. Il a la capacité incroyable de rendre son domaine accessible à quelqu'un comme moi qui n'y connaît absolument rien. Je recommande à 1000 %.<\u002Fp>\n        <div class=\"who\">Gina L.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Conseiller extrêmement professionnel et à l'écoute. Il prend vraiment le temps de comprendre notre situation et nos objectifs avant de proposer des solutions adaptées. Aucune pression commerciale, aucun produit « imposé » : les conseils sont personnalisés et transparents.<\u002Fp>\n        <div class=\"who\">Damien D.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>N'ayant aucune compétence en gestion financière, j'ai sollicité Alban Savino. Les explications sont claires et à la portée de tous. Très professionnel et pédagogue, il propose un projet réellement adapté à notre situation personnelle, avec des objectifs concrets.<\u002Fp>\n        <div class=\"who\">Edouard C.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Recommandé par un ami, Alban m'a proposé un accompagnement complet en m'expliquant les notions basiques du monde « patrimoine / investissements » et a su répondre à mes attentes avec des solutions adaptées à ma situation. Toujours disponible et à l'écoute.<\u002Fp>\n        <div class=\"who\">Pierre D.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Dès la prise de contact téléphonique, Alban est disponible et à l'écoute bienveillante de mon projet. Il me guide vers des objectifs en adéquation avec ma volonté et ses informations sont partagées avec pédagogie, ce qui est inestimable dans mon cas.<\u002Fp>\n        <div class=\"who\">Fabienne P.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Alban prend toujours le temps d'expliquer clairement la nature des produits et leur intérêt concret pour ma situation. J'ai beaucoup apprécié qu'il prenne en considération mes valeurs et mes objectifs personnels dans ses conseils.<\u002Fp>\n        <div class=\"who\">Paul J.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Super conseiller ! Toujours à l'écoute, réactif et de très bon conseil. Alban Savino prend le temps d'expliquer et de trouver les meilleures solutions tout en restant accessible — je recommande à 100 %.<\u002Fp>\n        <div class=\"who\">Stéphane<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote reveal\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <span class=\"mark\">“<\u002Fspan>\n        <p>Je recommande Alban sans hésiter, il est dynamique, honnête et hyper réactif. Merci à lui pour tous les supers conseils et je vous encourage à le contacter !<\u002Fp>\n        <div class=\"who\">Mélanie S.<small>Avis Google<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"t-nav\"><button id=\"tPrev\" aria-label=\"Avis précédents\">←<\u002Fbutton><button id=\"tNext\" aria-label=\"Avis suivants\">→<\u002Fbutton><\u002Fdiv>\n    <p style=\"text-align:center;margin-top:22px\"><a href=\"https://maps.google.com/?cid=9391941182211259187\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--gold);text-decoration:none;font-size:.9rem;letter-spacing:.04em;border-bottom:1px solid rgba(201,163,92,.4)\">Voir tous les avis sur Google →<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== À PROPOS ==================== -->\n<section class=\"section\" id=\"apropos\">\n  <div class=\"about\">\n    <div class=\"portrait reveal\">\n      <div class=\"pimg\" role=\"img\" aria-label=\"Portrait d'Alban Savino\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"reveal\">\n      <div class=\"kicker\" style=\"text-align:left\">À propos<\u002Fdiv>\n      <h2>Un conseiller, pas un <em>vendeur<\u002Fem>.<\u002Fh2>\n      <p>Je suis Alban Savino, conseiller en gestion de patrimoine au sein du réseau Inovéa. Mon métier : aider les actifs, cadres et indépendants à structurer leur épargne et à prendre des décisions patrimoniales éclairées.<\u002Fp>\n      <p>Ma conviction est simple : un bon conseil commence par une bonne écoute. C'est pourquoi chaque accompagnement démarre par un bilan complet de votre situation — jamais par un produit.<\u002Fp>\n      <p>Les solutions sont sélectionnées en architecture ouverte auprès des grandes compagnies d'assurance et sociétés de gestion référencées par le réseau Inovéa — jamais l'inverse : d'abord votre situation, ensuite le support.<\u002Fp>\n      <div class=\"points\">\n        <div class=\"point\"><div class=\"dot\"><\u002Fdiv><span>Approche globale : votre situation analysée dans son ensemble avant toute recommandation<\u002Fspan><\u002Fdiv>\n        <div class=\"point\"><div class=\"dot\"><\u002Fdiv><span>Pédagogie : chaque solution expliquée simplement, avantages comme risques<\u002Fspan><\u002Fdiv>\n        <div class=\"point\"><div class=\"dot\"><\u002Fdiv><span>Cadre réglementé : un exercice encadré, dans le respect de vos intérêts<\u002Fspan><\u002Fdiv>\n        <div class=\"point\"><div class=\"dot\"><\u002Fdiv><span>Accompagnement long terme : points réguliers, ajustements et disponibilité dans la durée<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin-top:30px\">La pédagogie, c'est aussi en dehors des rendez-vous : retrouvez <a href=\"https://www.instagram.com/monfuturpatrimoine/\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(201,163,92,.4)\">Mon&nbsp;Futur&nbsp;Patrimoine<\u002Fa>, la page Instagram de vulgarisation financière que je co-anime avec Paul, créateur de contenu — pour comprendre l'épargne, la fiscalité et l'investissement en quelques minutes par semaine.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== PÉDAGOGIE / INSTAGRAM ==================== -->\n<section class=\"section\" id=\"faq\" style=\"padding-top:40px\">\n  <div class=\"kicker reveal\">Questions fréquentes<\u002Fdiv>\n  <h2 class=\"section-title reveal\">Vous vous demandez peut-être…<\u002Fh2>\n  <p class=\"section-sub reveal\"><\u002Fp>\n  <div class=\"faq-list reveal\">\n    <div class=\"faq-item\">\n      <button class=\"faq-q\">Les rendez-vous sont-ils payants ?<\u002Fbutton>\n      <div class=\"faq-a\"><p>Non — tous les rendez-vous sont gratuits, du premier bilan au suivi dans la durée. Le bilan initial est un échange de 45 minutes, sans engagement, pour faire le point sur votre situation et identifier vos marges de progression. Vous repartez avec une vision claire, que vous décidiez de poursuivre ou non. Ma rémunération provient des partenaires dont les solutions sont mises en place (voir question suivante), jamais d'honoraires facturés sur les rendez-vous.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <button class=\"faq-q\">Comment êtes-vous rémunéré ?<\u002Fbutton>\n      <div class=\"faq-a\"><p>Ma rémunération est transparente et vous est présentée avant toute souscription, conformément à la réglementation. Elle provient principalement des partenaires dont les solutions sont mises en place, sans surcoût caché pour vous. Vous saurez toujours qui rémunère quoi.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <button class=\"faq-q\">Faut-il déjà avoir un gros patrimoine ?<\u002Fbutton>\n      <div class=\"faq-a\"><p>Non. La gestion de patrimoine n'est pas réservée aux fortunes. La capacité d'épargne et le temps sont vos meilleurs alliés : plus on structure tôt, plus la stratégie a de potentiel. Beaucoup de mes clients démarrent avec une simple capacité d'épargne mensuelle.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <button class=\"faq-q\">Quels sont les risques des solutions proposées ?<\u002Fbutton>\n      <div class=\"faq-a\"><p>Tout investissement comporte des risques, dont un risque de perte en capital pour les supports non garantis. Mon rôle est de vous les présenter clairement et de construire une allocation cohérente avec votre profil de risque et votre horizon. Aucun rendement ne peut être garanti, et je ne vous promettrai jamais le contraire.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"faq-item\">\n      <button class=\"faq-q\">Comment se passe le suivi ensuite ?<\u002Fbutton>\n      <div class=\"faq-a\"><p>Vous bénéficiez de points réguliers pour ajuster la stratégie à l'évolution de votre situation (changement professionnel, projet immobilier, famille…). Je reste disponible entre les rendez-vous pour toute question.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== CONTACT / RDV ==================== -->\n<section class=\"insta-band\" id=\"pedagogie\">\n  <div class=\"section\">\n    <div class=\"kicker reveal\">Pédagogie financière<\u002Fdiv>\n    <h2 class=\"section-title reveal\">La finance, expliquée simplement<\u002Fh2>\n    <p class=\"section-sub reveal\">Avec Paul, créateur de contenu, nous décortiquons chaque semaine un sujet d'épargne, de fiscalité ou d'investissement — en quelques slides, sans jargon.<\u002Fp>\n    <div class=\"insta-grid reveal\">\n      <a class=\"insta-card\" href=\"https://www.instagram.com/monfuturpatrimoine/\" target=\"_blank\" rel=\"noopener\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRYYGRj/2wBDAQQEBAYFBgsGBgsYEA0QGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBj/wAARCAJYAeADASIAAhEBAxEB/8QAHQABAAEEAw on resize(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight}\nresize();addEventListener('resize',resize);\nfor(let i=0;i<55;i++)parts.push({x:Math.random()*1600,y:Math.random()*900,r:Math.random()*1.6+.4,\n  vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,o:Math.random()*.5+.15});\n(function anim(){ctx.clearRect(0,0,W,H);\n  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;\n    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;\n    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fillStyle=`rgba(201,163,92,${p.o})`;ctx.fill()});\n  requestAnimationFrame(anim)})();\n\n/* ============ Révélation au scroll ============ */\nconst io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){\n  setTimeout(()=>e.target.classList.add('visible'),(e.target.dataset.d||0)*1);io.unobserve(e.target)}}),{threshold:.12});\ndocument.querySelectorAll('.reveal, .card, .quote, .step').forEach((el,i)=>{\n  el.classList.add('reveal');el.dataset.d=(i%3)*120;io.observe(el)});\n\n/* ============ Compteurs animés ============ */\nconst io2=new IntersectionObserver(es=>es.forEach(e=>{if(!e.isIntersecting)return;io2.unobserve(e.target);\n  const el=e.target,target=+el.dataset.target,suf=el.dataset.suffix||'';const t0=performance.now();\n  (function tick(t){const p=Math.min((t-t0)/1800,1),ease=1-Math.pow(1-p,3);\n    el.textContent=Math.round(target*ease)+suf;if(p<1)requestAnimationFrame(tick)})(t0)}),{threshold:.6});\ndocument.querySelectorAll('.num').forEach(n=>io2.observe(n));\n\n/* ============ FAQ accordéon ============ */\ndocument.querySelectorAll('.faq-item').forEach(item=>{\n  const q=item.querySelector('.faq-q'),a=item.querySelector('.faq-a');\n  q.addEventListener('click',()=>{\n    const open=item.classList.contains('open');\n    document.querySelectorAll('.faq-item.open').forEach(o=>{o.classList.remove('open');o.querySelector('.faq-a').style.maxHeight=0});\n    if(!open){item.classList.add('open');a.style.maxHeight=a.scrollHeight+'px'}\n  });\n});\n\n/* ============ Check-up patrimonial ============ */\nconst PROF={q:\"Pour personnaliser vos conseils : votre situation professionnelle ?\",\n opts:[\"Salarié(e) du privé\",\"Indépendant / chef d\\'entreprise\",\"Profession libérale\",\"Fonctionnaire\",\"Autre\"]};\nconst PROFTIPS=[\n \"Vérifiez si votre entreprise propose une épargne salariale avec abondement (PEE, PER collectif) : c\\'est de l\\'argent offert par l\\'employeur, souvent oublié. Plafonds, déblocage anticipé, fiscalité — ça se regarde avant tout le reste.\",\n \"En tant qu\\'indépendant, vos versements PER bénéficient de plafonds de déduction majorés, et votre prévoyance ne dépend que de vous. Ces deux sujets passent avant la performance de vos placements.\",\n \"Profession libérale : plafonds PER majorés, prévoyance à construire vous-même, et une caisse de retraite dont les règles méritent d\\'être comprises tôt. Trois sujets prioritaires.\",\n \"Fonctionnaire : vos primes comptent très peu pour votre future pension — un complément par capitalisation (PER) se justifie souvent. Et la sécurité de votre statut est un atout pour accepter davantage de long terme.\",\n null];\nconst RET_BY_PROF=[\n null,\n \"Votre retraite obligatoire sera souvent faible au regard de vos revenus actuels — c\\'est le statut le plus exposé. Première étape gratuite : votre simulation officielle sur info-retraite.fr. Ensuite, PER (déductible) et capitalisation long terme sont généralement prioritaires.\",\n \"Selon votre caisse (CIPAV, CARMF, CARPIMKO…), l\\'écart entre revenus d\\'activité et pension est souvent très important. Faites votre simulation sur info-retraite.fr — et anticipez par la capitalisation : PER, assurance vie.\",\n \"Votre pension est calculée sur le traitement des 6 derniers mois, mais vos primes n\\'y entrent quasiment pas : plus elles pèsent dans votre revenu, plus l\\'écart sera grand. Simulation sur info-retraite.fr, puis complément par capitalisation.\",\n null];\nconst PROT_INDEP=\"Contrairement à un salarié, aucun employeur ne vous couvre : sans prévoyance personnelle, un arrêt de travail prolongé peut fragiliser votre famille et votre activité. C\\'est souvent LE trou dans la raquette des indépendants — à traiter avant même la performance des placements.\";\nconst QUIZ=[\n {q:\"Si un imprévu arrivait demain, combien de mois de dépenses votre épargne disponible couvre-t-elle ?\",\n  opts:[\n   {l:\"Moins d\\'1 mois\",s:0,a:{t:\"Votre épargne de précaution\",d:\"La règle de base : 3 à 6 mois de dépenses sur un support disponible immédiatement (livret). C\\'est ce coussin qui vous évite de vendre vos placements au pire moment. À constituer avant tout investissement.\"}},\n   {l:\"1 à 3 mois\",s:1,a:{t:\"Votre épargne de précaution\",d:\"Vous avez un début de coussin — visez 3 à 6 mois de dépenses sur livret. C\\'est ce qui vous évite de toucher à vos investissements en cas d\\'imprévu.\"}},\n   {l:\"3 à 6 mois\",s:3},\n   {l:\"Plus de 6 mois\",s:2,a:{t:\"Trop de précaution ?\",d:\"Au-delà de 6 mois de dépenses, l\\'excédent dort probablement : chaque année, il perd du pouvoir d\\'achat face à l\\'inflation. Ce surplus pourrait travailler davantage, selon votre horizon et votre profil.\"}}\n  ]},\n {q:\"Quelle part de votre épargne totale est posée sur livrets et comptes courants ?\",\n  opts:[\n   {l:\"La quasi-totalité\",s:0,a:{t:\"De l\\'argent qui dort\",d:\"Les livrets sont plafonnés et leur taux couvre rarement l\\'inflation. Chaque euro au-delà de votre épargne de précaution mérite une vraie stratégie — calibrée sur votre horizon et votre tolérance au risque.\"}},\n   {l:\"Environ la moitié\",s:1,a:{t:\"De l\\'argent qui dort\",d:\"Une part significative de votre épargne est probablement sous-employée. Question à vous poser pour chaque euro : « ai-je besoin de cet argent dans moins de 3 ans ? » Si non, il peut sans doute travailler davantage.\"}},\n   {l:\"Une minorité\",s:3},\n   {l:\"Honnêtement, je ne sais pas\",s:0,a:{t:\"D\\'abord, la cartographie\",d:\"On ne peut pas optimiser ce qu\\'on ne voit pas. Première étape : lister tous vos comptes, contrats et placements avec leur montant. Un simple tableau suffit — c\\'est d\\'ailleurs la première chose qu\\'on fait dans un bilan.\"}}\n  ]},\n {q:\"Connaissez-vous le montant estimé de votre future pension de retraite ?\",ret:true,\n  opts:[\n   {l:\"Oui, j\\'ai fait la simulation\",s:3},\n   {l:\"Vaguement\",s:1,a:{t:\"Votre retraite, chiffrée\",d:\"Action gratuite dès ce soir : votre simulation officielle sur info-retraite.fr (10 minutes). On ne comble pas un écart qu\\'on ne connaît pas — et pour un cadre, la baisse de revenus dépasse souvent 30 %.\"}},\n   {l:\"Aucune idée\",s:0,a:{t:\"Votre retraite, chiffrée\",d:\"Action gratuite dès ce soir : votre simulation officielle sur info-retraite.fr (10 minutes). C\\'est LE point de départ — pour un cadre, la baisse de revenus à la retraite dépasse souvent 30 %.\"}}\n  ]},\n {q:\"Utilisez-vous au moins un dispositif pour réduire votre impôt sur le revenu ?\",\n  opts:[\n   {l:\"Oui\",s:3},\n   {l:\"Non, et je paie plus de 2 500 € d\\'impôt par an\",s:0,a:{t:\"Votre levier fiscal inexploité\",d:\"Ordre de grandeur : dans une tranche à 30 %, 1 000 € versés sur un PER réduisent votre impôt d\\'environ 300 € (dans les plafonds de déduction). Il existe d\\'autres leviers — l\\'important est de choisir selon votre situation, pas selon la mode.\"}},\n   {l:\"Non, mais je paie peu d\\'impôts\",s:2},\n   {l:\"Je ne sais pas\",s:1,a:{t:\"Y voir clair sur votre fiscalité\",d:\"Regardez la ligne « impôt sur le revenu net » de votre dernier avis d\\'imposition. Au-delà de 2 000-2 500 € par an, des leviers d\\'optimisation méritent d\\'être étudiés.\"}}\n  ]},\n {q:\"Si vos placements perdaient 15 % en quelques mois, que feriez-vous ?\",\n  opts:[\n   {l:\"Je vendrais pour limiter la casse\",s:0,a:{t:\"Le réflexe qui coûte le plus cher\",d:\"Vendre après une baisse transforme une perte temporaire en perte définitive — c\\'est statistiquement l\\'erreur n°1 des épargnants. Les baisses font partie du fonctionnement normal des marchés. La parade : une allocation calibrée pour que vous puissiez tenir sans paniquer, et une épargne de précaution qui évite de vendre au pire moment.\"}},\n   {l:\"Je ne sais pas, ça m\\'angoisserait\",s:1,a:{t:\"Connaître votre tolérance au risque\",d:\"C\\'est la question à régler AVANT d\\'investir, pas pendant la tempête. Une bonne allocation est celle qui vous laisse dormir : si une baisse de 15 % vous empêcherait de tenir, elle doit être plus prudente — quitte à viser moins. C\\'est exactement ce que mesure un profil de risque.\"}},\n   {l:\"Je ne toucherais à rien\",s:2},\n   {l:\"J\\'en profiterais pour renforcer\",s:3}\n  ]},\n {q:\"Avez-vous des enfants à qui financer des études un jour ?\",\n  opts:[\n   {l:\"Oui, et une épargne leur est dédiée\",s:3},\n   {l:\"Oui, mais rien de dédié pour l\\'instant\",s:1,a:{t:\"Le budget études, anticipé\",d:\"Des études supérieures coûtent couramment 30 000 à 80 000 € par enfant, logement compris. Commencer tôt change tout : 100 €/mois dès la naissance pèsent bien moins lourd que 500 €/mois à partir du lycée. Une enveloppe dédiée permet aussi de « prendre date » fiscalement pour eux.\"}},\n   {l:\"Pas encore, mais c\\'est prévu\",s:2,a:{t:\"Anticiper avant l\\'arrivée\",d:\"Bon réflexe d\\'y penser dès maintenant : plus l\\'épargne démarre tôt, plus l\\'effort mensuel est léger. Et certains choix d\\'enveloppes se préparent avant même la naissance.\"}},\n   {l:\"Non\",s:null}\n  ]},\n {q:\"Si un coup dur arrivait, vos proches seraient-ils protégés (prévoyance, clauses à jour) ?\",prot:true,\n  opts:[\n   {l:\"Oui, c\\'est organisé\",s:3},\n   {l:\"Partiellement\",s:1,a:{t:\"La protection de vos proches\",d:\"Vérifiez la clause bénéficiaire de vos contrats d\\'assurance vie : rédigée « par défaut » il y a des années, elle ne correspond peut-être plus à votre situation familiale. 10 minutes de lecture qui peuvent tout changer.\"}},\n   {l:\"Je n\\'ai jamais vérifié\",s:0,a:{t:\"La protection de vos proches\",d:\"Sans organisation, c\\'est la loi qui décide — pas vous. Premier réflexe : relire la clause bénéficiaire de vos contrats d\\'assurance vie. Rédigée « par défaut », elle ne reflète peut-être plus votre situation familiale.\"}}\n  ]},\n {q:\"Savez-vous ce que votre patrimoine coûterait en droits de succession à vos proches ?\",\n  opts:[\n   {l:\"Oui, et c\\'est anticipé\",s:3},\n   {l:\"J\\'y ai pensé, sans aller au bout\",s:1,a:{t:\"Le compteur des 15 ans\",d:\"Chaque parent peut donner 100 000 € par enfant tous les 15 ans, sans droits à payer — un abattement qui se « recharge ». Plus on déclenche le premier compteur tôt, plus on peut transmettre sans frottement au cours d\\'une vie. L\\'assurance vie ajoute un cadre de transmission spécifique en plus.\"}},\n   {l:\"Non, jamais regardé\",s:0,a:{t:\"Le compteur des 15 ans\",d:\"Info que 90 % des gens découvrent trop tard : chaque parent peut donner 100 000 € par enfant tous les 15 ans sans droits, abattement renouvelable. Y penser à 45 ans plutôt qu\\'à 75, c\\'est pouvoir « recharger le compteur » plusieurs fois — la facture finale n\\'a rien à voir.\"}}\n  ]},\n {q:\"Savez-vous ce que vos placements vous coûtent en frais chaque année ?\",\n  opts:[\n   {l:\"Oui, précisément\",s:3},\n   {l:\"À peu près\",s:1,a:{t:\"Les frais, l\\'ennemi silencieux\",d:\"1 % de frais annuels en plus, c\\'est environ 25 % de capital en moins au bout de 30 ans. Les frais sont le seul paramètre d\\'un placement qui est garanti à 100 % — autant les connaître précisément.\"}},\n   {l:\"Pas du tout\",s:0,a:{t:\"Les frais, l\\'ennemi silencieux\",d:\"1 % de frais annuels en plus, c\\'est environ 25 % de capital en moins au bout de 30 ans. Demandez le détail : frais d\\'entrée, de gestion, d\\'arbitrage. C\\'est le seul paramètre d\\'un placement garanti à 100 %.\"}}\n  ]}\n];\nconst PILLARS=[\"Précaution\",\"Épargne active\",\"Retraite\",\"Fiscalité\",\"Sang-froid\",\"Études enfants\",\"Protection\",\"Transmission\",\"Frais\"];\nlet qStep=0,qProf=0;const qAns=[];\nconst qBody=document.getElementById('quizBody'),qBar=document.getElementById('qBar');\nconst TOTAL=QUIZ.length+1;\nfunction qRender(){\n  qBar.style.width=(qStep/TOTAL*100)+'%';\n  if(qStep>TOTAL-1)return qResult();\n  const isProf=qStep===0;\n  const q=isProf?PROF:QUIZ[qStep-1];\n  const opts=isProf?q.opts.map((o,k)=>'<button class=\"q-opt\" data-k=\"'+k+'\">'+o+'<\u002Fbutton>')\n                   :q.opts.map((o,k)=>'<button class=\"q-opt\" data-k=\"'+k+'\">'+o.l+'<\u002Fbutton>');\n  qBody.innerHTML='<div class=\"q-step\"><div class=\"q-num\">Question '+(qStep+1)+' / '+TOTAL+'<\u002Fdiv><h3>'+q.q+'<\u002Fh3>'\n   +'<div class=\"q-opts\">'+opts.join('')+'<\u002Fdiv>'\n   +(qStep>0?'<button class=\"q-back\">← Question précédente<\u002Fbutton>':'')+'<\u002Fdiv>';\n  qBody.querySelectorAll('.q-opt').forEach(b=>b.addEventListener('click',()=>{\n    if(isProf)qProf=+b.dataset.k;else qAns[qStep-1]=+b.dataset.k;\n    qStep++;qRender()}));\n  const back=qBody.querySelector('.q-back');\n  if(back)back.addEventListener('click',()=>{qStep--;qRender()});\n}\nfunction qResult(){\n  qBar.style.width='100%';\n  const picked=qAns.map((k,i)=>{\n    const o=Object.assign({},QUIZ[i].opts[k]);\n    if(o.a){o.a=Object.assign({},o.a);\n      if(QUIZ[i].ret&&RET_BY_PROF[qProf])o.a.d=RET_BY_PROF[qProf];\n      if(QUIZ[i].prot&&(qProf===1||qProf===2))o.a.d=PROT_INDEP;}\n    return o});\n  const entries=picked.map((o,i)=>({o:o,i:i})).filter(e=>e.o.s!=null);\n  const total=entries.reduce((s,e)=>s+e.o.s,0),max=Math.max(entries.length*3,1);\n  const score=Math.round(total/max*100);\n  const grade=score>85?\"Très solide\":score>65?\"Bien construit\":score>=40?\"De bonnes bases\":\"À structurer\";\n  const weak=entries.filter(e=>e.o.a).sort((a,b)=>a.o.s-b.o.s).slice(0,3);\n  const strong=entries.filter(e=>e.o.s===3);\n  let verdict='';\n  if(strong.length&&weak.length)verdict='Point fort : <b>'+PILLARS[strong[0].i]+'<\u002Fb>. À renforcer en priorité : <b>'+weak.map(e=>PILLARS[e.i].toLowerCase()).join('<\u002Fb>, <b>')+'<\u002Fb>.';\n  else if(weak.length)verdict='À renforcer en priorité : <b>'+weak.map(e=>PILLARS[e.i].toLowerCase()).join('<\u002Fb>, <b>')+'<\u002Fb>.';\n  else verdict='Tous les piliers sont au vert — situation rare.';\n  let inner='<div class=\"q-step\"><div class=\"q-score-wrap\"><div class=\"q-score\"><span id=\"qNum\">0<\u002Fspan><small> / 100<\u002Fsmall><\u002Fdiv><div class=\"q-grade\">'+grade+'<\u002Fdiv><\u002Fdiv>'\n   +'<p class=\"q-verdict\">'+verdict+'<\u002Fp>'\n   +'<div class=\"q-pillars\">'+entries.map(e=>'<div class=\"q-pill\"><label>'+PILLARS[e.i]+'<\u002Flabel><div class=\"pbar\"><i data-w=\"'+Math.round(e.o.s/3*100)+'%\"><\u002Fi><\u002Fdiv><\u002Fdiv>').join('')+'<\u002Fdiv>';\n  if(PROFTIPS[qProf])inner+='<div class=\"q-axes\" style=\"margin-bottom:14px\"><div class=\"q-axis\" style=\"border-color:rgba(201,163,92,.55)\"><b>Spécifique à votre statut<\u002Fb><span>'+PROFTIPS[qProf]+'<\u002Fspan><\u002Fdiv><\u002Fdiv>';\n  if(weak.length){inner+='<h3 style=\"font-size:1.3rem;margin-bottom:18px\">Vos priorités, et quoi faire concrètement<\u002Fh3><div class=\"q-axes\">'\n    +weak.map(e=>'<div class=\"q-axis\"><b>'+e.o.a.t+'<\u002Fb><span>'+e.o.a.d+'<\u002Fspan><\u002Fdiv>').join('')+'<\u002Fdiv>'}\n  else{inner+='<p style=\"color:var(--muted);font-weight:300;margin-bottom:24px\">Situation remarquablement structurée. Reste à vérifier que chaque brique est optimisée — frais, fiscalité, adéquation à vos projets : c\\'est souvent là que se cachent les marges de progression.<\u002Fp>'}\n  inner+='<a class=\"btn-gold\" href=\"https://calendly.com/asavino-invest/bilan-patrimonial-avec-alban-savino\" target=\"_blank\" rel=\"noopener\">Réserver mon bilan<\u002Fa>'\n   +'<p class=\"q-disc\">Score et conseils fournis à titre indicatif et pédagogique sur la base de vos réponses ; ils ne constituent pas un conseil personnalisé. Toute recommandation suppose une étude complète de votre situation. Tout investissement présente un risque de perte en capital.<\u002Fp>'\n   +'<button class=\"q-back\">↺ Refaire le check-up<\u002Fbutton><\u002Fdiv>';\n  qBody.innerHTML=inner;\n  qBody.querySelector('.q-back').addEventListener('click',()=>{qStep=0;qAns.length=0;qRender()});\n  setTimeout(()=>qBody.querySelectorAll('.pbar i').forEach(b=>b.style.width=b.dataset.w),350);\n  const el=document.getElementById('qNum'),t0=performance.now();\n  (function tick(t){const p=Math.min((t-t0)/1600,1),e=1-Math.pow(1-p,3);el.textContent=Math.round(score*e);if(p<1)requestAnimationFrame(tick)})(t0);\n}\nqRender();\n\n/* ============ Carrousel témoignages ============ */\nconst tTrack=document.getElementById('quoteTrack');\nconst tStep=()=>tTrack.querySelector('.quote').getBoundingClientRect().width+26;\ndocument.getElementById('tPrev').addEventListener('click',()=>tTrack.scrollBy({left:-tStep(),behavior:'smooth'}));\ndocument.getElementById('tNext').addEventListener('click',()=>tTrack.scrollBy({left:tStep(),behavior:'smooth'}));\n\n/* ============ Fiches besoins (modales) ============ */\nconst FICHES=[\n {t:\"Faire travailler mon épargne\",\n  intro:\"Au-delà de votre épargne de précaution (l\\'équivalent de 3 à 6 mois de dépenses, qui doit rester disponible), l\\'argent qui dort sur des livrets perd du pouvoir d\\'achat face à l\\'inflation. La question n\\'est pas de prendre des risques inconsidérés : c\\'est d\\'adapter chaque euro à son horizon.\",\n  lev:[\"Assurance vie en unités de compte (et contrat de capitalisation) : un contrat investi et suivi activement — pas une enveloppe qu\\'on laisse dormir sur le fonds en euros. Les UC présentent un risque de perte en capital, compensé par le potentiel et l\\'horizon\",\"PER et épargne salariale (PEE, abondement) : préparer demain avec un avantage fiscal — et parfois le coup de pouce de l\\'employeur\",\"SCPI : ajouter une brique immobilière génératrice de revenus potentiels\",\"Private equity : l\\'économie réelle non cotée, pour une part mesurée du patrimoine — horizon long, liquidité limitée\",\"La méthode : allocation par horizon, versements programmés, diversification — avec option ISR pour donner du sens à votre épargne\"],\n  ex:\"Marie a 30 000 € répartis sur des livrets. Après son bilan, elle conserve 10 000 € de précaution, et investit le reste progressivement sur une assurance vie calibrée selon son profil et son horizon de 10 ans.\",\n  key:\"Le bon placement n\\'existe pas dans l\\'absolu : il n\\'existe que par rapport à votre situation, votre horizon et votre tolérance au risque. C\\'est tout l\\'objet du bilan.\"},\n {t:\"Alléger ma fiscalité\",\n  intro:\"La fiscalité ne se subit pas, elle s\\'anticipe — et elle se travaille toute l\\'année, pas dans la précipitation de décembre. Selon votre tranche d\\'imposition et votre situation, plusieurs leviers légaux existent.\",\n  lev:[\"PER : les versements sont déductibles de votre revenu imposable (dans les plafonds en vigueur)\",\"Assurance vie : un cadre fiscal qui devient très avantageux après 8 ans de détention\",\"Girardin industriel : une réduction d\\'impôt immédiate et puissante, en contrepartie d\\'un cadre strict et d\\'un risque spécifique — à réserver aux situations adaptées\",\"Immobilier défiscalisant : conjuguer constitution de patrimoine et réduction d\\'impôt, selon les dispositifs en vigueur\",\"Souscription au capital de SCIC : soutenir l\\'économie sociale et solidaire dans un cadre fiscal incitatif\",\"SCPI en démembrement ou à crédit selon votre situation et vos objectifs\"],\n  ex:\"Thomas, cadre imposé dans la tranche à 30 %, met en place des versements réguliers sur un PER : chaque euro versé vient réduire son revenu imposable, tout en préparant sa retraite.\",\n  key:\"Un avantage fiscal ne doit jamais être le seul moteur d\\'une décision d\\'investissement. On choisit d\\'abord un bon placement — l\\'économie d\\'impôt est un accélérateur, pas une fin.\"},\n {t:\"Préparer ma retraite\",\n  intro:\"Le passage à la retraite s\\'accompagne le plus souvent d\\'une baisse sensible de revenus, particulièrement pour les cadres et les indépendants. La bonne nouvelle : plus on s\\'y prend tôt, plus l\\'effort d\\'épargne mensuel est faible, grâce aux intérêts composés.\",\n  lev:[\"PER : épargne dédiée à la retraite avec déduction fiscale à l\\'entrée\",\"Assurance vie : souplesse totale, capital disponible à tout moment\",\"SCPI : se constituer des revenus potentiels complémentaires pour le jour J\",\"Stratégie progressive : sécurisation du capital à l\\'approche de l\\'échéance\"],\n  ex:\"À 35 ans, en épargnant 200 € par mois, vous capitalisez pendant 30 ans — l\\'effet des intérêts composés joue à plein. Le même objectif visé à 50 ans demande un effort mensuel bien supérieur.\",\n  key:\"En matière de retraite, le temps est votre meilleur allié. Le meilleur moment pour commencer était hier ; le deuxième meilleur, c\\'est aujourd\\'hui.\"},\n {t:\"Investir dans l\\'immobilier\",\n  intro:\"L\\'immobilier locatif direct demande du temps : recherche, locataires, travaux, vacance locative. Quand on a une vie professionnelle dense, plusieurs solutions permettent d\\'accéder à l\\'immobilier sans ces contraintes.\",\n  lev:[\"SCPI de rendement : des revenus potentiels réguliers, sans gestion, accessibles dès quelques milliers d\\'euros\",\"Immobilier locatif clé en main : de la recherche du bien à la mise en location, entièrement délégué — vous investissez, une équipe s\\'occupe du reste\",\"Immobilier défiscalisant : un bien qui se construit aussi grâce à l\\'économie d\\'impôt, selon les dispositifs en vigueur\",\"Modalités adaptables : au comptant, à crédit, ou en démembrement selon votre objectif\"],\n  ex:\"Karim veut de l\\'immobilier mais n\\'a ni le temps ni l\\'envie de gérer. Il investit dans plusieurs SCPI diversifiées (bureaux, santé, commerces, Europe) et perçoit des revenus potentiels chaque trimestre.\",\n  key:\"Les revenus et le capital d\\'une SCPI ne sont pas garantis, et la liquidité est limitée. D\\'où l\\'importance de la sélection des supports et de leur juste place dans votre patrimoine.\"},\n {t:\"Protéger mes proches\",\n  intro:\"Sans organisation, c\\'est la loi qui décide de la répartition de votre patrimoine — et la fiscalité peut être lourde pour vos héritiers. Anticiper, c\\'est garder la main et protéger réellement ceux qui comptent.\",\n  lev:[\"Clause bénéficiaire d\\'assurance vie : un outil de transmission puissant, avec des abattements fiscaux spécifiques\",\"Prévoyance : protéger le niveau de vie de votre famille en cas de coup dur\",\"Donations : transmettre de son vivant en profitant des abattements renouvelables\",\"Démembrement : transmettre la propriété tout en conservant l\\'usage ou les revenus\"],\n  ex:\"Sophie, maman de deux enfants, fait réécrire la clause bénéficiaire de son assurance vie — rédigée par défaut depuis 10 ans. Résultat : une transmission organisée, conforme à ses volontés, dans un cadre fiscal favorable.\",\n  key:\"La transmission se prépare de son vivant, à tête reposée. Chaque situation familiale est unique : c\\'est un sujet qui mérite du sur-mesure, pas des clauses types.\"},\n {t:\"Y voir clair, enfin\",\n  intro:\"Un vieux contrat d\\'assurance vie ici, des livrets là, un PEE oublié chez un ancien employeur… L\\'épargne des actifs est souvent éparpillée, sans vision d\\'ensemble ni stratégie. Première étape : la cartographie.\",\n  lev:[\"Inventaire complet : tout ce que vous possédez, où, et à quelles conditions\",\"Analyse : frais, fiscalité, adéquation avec vos objectifs réels\",\"Priorisation : les 2-3 actions qui auront le plus d\\'impact sur votre situation\",\"Plan d\\'action concret, expliqué simplement — avantages comme risques\"],\n  ex:\"C\\'est exactement le déroulé du bilan patrimonial de 45 minutes : vous repartez avec une vision claire de votre situation et vos priorités identifiées — que vous décidiez de poursuivre ou non.\",\n  key:\"On ne peut pas optimiser ce qu\\'on ne voit pas. La clarté d\\'abord, les solutions ensuite.\"}\n];\nconst fOverlay=document.createElement('div');fOverlay.className='modal-overlay';\nfOverlay.innerHTML='<div class=\"modal\" role=\"dialog\" aria-modal=\"true\"><button class=\"close\" aria-label=\"Fermer\">×<\u002Fbutton><div class=\"m-body\"><\u002Fdiv><\u002Fdiv>';\ndocument.body.appendChild(fOverlay);\nconst mBody=fOverlay.querySelector('.m-body');\nfunction openFiche(i){const f=FICHES[i];\n  mBody.innerHTML='<div class=\"m-icon\">'+document.querySelectorAll('#expertises .card .icon')[i].innerHTML+'<\u002Fdiv><h3>'+f.t+'<\u002Fh3><p class=\"m-intro\">'+f.intro+'<\u002Fp>'\n   +'<h4>Ce qu\\'on peut activer<\u002Fh4><ul>'+f.lev.map(l=>'<li>'+l+'<\u002Fli>').join('')+'<\u002Ful>'\n   +'<h4>Situation type<\u002Fh4><p class=\"m-ex\">'+f.ex+'<\u002Fp>'\n   +'<h4>À retenir<\u002Fh4><p class=\"m-key\">'+f.key+'<\u002Fp>'\n   +'<a class=\"btn-gold\" href=\"https://calendly.com/asavino-invest/bilan-patrimonial-avec-alban-savino\" target=\"_blank\" rel=\"noopener\">Parlons de votre situation — bilan offert<\u002Fa>'\n   +'<p class=\"m-disc\">Exemples fournis à titre purement illustratif et pédagogique ; ils ne constituent pas un conseil personnalisé. Tout investissement présente un risque de perte en capital. Toute recommandation suppose une étude préalable de votre situation.<\u002Fp>';\n  fOverlay.classList.add('open');document.body.style.overflow='hidden';fOverlay.querySelector('.modal').scrollTop=0}\nfunction closeFiche(){fOverlay.classList.remove('open');document.body.style.overflow=''}\nfOverlay.addEventListener('click',e=>{if(e.target===fOverlay)closeFiche()});\nfOverlay.querySelector('.close').addEventListener('click',closeFiche);\naddEventListener('keydown',e=>{if(e.key==='Escape')closeFiche()});\ndocument.querySelectorAll('#expertises .card').forEach((c,i)=>{\n  const m=document.createElement('span');m.className='more';m.textContent='En savoir plus →';c.appendChild(m);\n  c.addEventListener('click',()=>openFiche(i));\n});\n\n/* ============ Fil de progression ============ */\nconst sp=document.getElementById('scrollProgress');\naddEventListener('scroll',()=>{const m=document.documentElement.scrollHeight-innerHeight;\n  sp.style.width=(m>0?scrollY/m*100:0)+'%'},{passive:true});\n\n/* ============ Titre héro : révélation mot par mot ============ */\nconst heroH1=document.querySelector('.hero h1');\nif(heroH1){let wi=0;\n  const wrap=node=>{[...node.childNodes].forEach(n=>{\n    if(n.nodeType===3){const frag=document.createDocumentFragment();\n      n.textContent.split(/(\\s+)/).forEach(t=>{\n        if(t==='')return;\n        if(/^\\s+$/.test(t)){frag.appendChild(document.createTextNode(t));return}\n        const s=document.createElement('span');s.className='w';\n        s.style.setProperty('--d',(0.3+wi*0.085)+'s');s.textContent=t;frag.appendChild(s);wi++});\n      node.replaceChild(frag,n)}\n    else if(n.nodeType===1&&n.tagName!=='BR')wrap(n)})};\n  wrap(heroH1);}\n\n/* ============ Cartes besoins : inclinaison 3D + reflet doré (souris uniquement) ============ */\nif(matchMedia('(pointer:fine)').matches){\n  document.querySelectorAll('#expertises .card').forEach(c=>{\n    c.addEventListener('pointermove',e=>{\n      const r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;\n      c.style.transform='perspective(800px) rotateY('+((x-.5)*7).toFixed(2)+'deg) rotateX('+((.5-y)*7).toFixed(2)+'deg) translateY(-8px)';\n      c.style.setProperty('--mx',(x*100)+'%');c.style.setProperty('--my',(y*100)+'%')});\n    c.addEventListener('pointerleave',()=>{c.style.transform=''});\n  });\n}\n\n/* ============ Année footer ============ */\ndocument.getElementById('year').textContent=new Date().getFullYear();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
